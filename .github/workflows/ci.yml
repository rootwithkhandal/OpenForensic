name: OpenForensic Cross-Platform CI/CD Verification Matrix

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Linux system dependencies (Tauri & WebKit)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libssl-dev libasound2-dev

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Frontend & Tauri CLI Dependencies
        run: npm ci

      - name: Install cargo-audit (with caching)
        uses: taiki-e/install-action@cargo-audit
        continue-on-error: true

      - name: Step 1 - Cargo Check (All Targets across Windows, macOS, Linux)
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Step 2 - Cargo Clippy (Deny Warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Step 3 - Run Library & Triage Unit Tests
        run: cargo test --lib --manifest-path src-tauri/Cargo.toml

      - name: Step 4 - Verify Cross-Platform Release Compilation
        run: cargo build --release --lib --manifest-path src-tauri/Cargo.toml

      - name: Step 5 - Dependency Vulnerability Scan (Cargo Audit)
        run: cargo audit
        continue-on-error: true
